name: Build

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    # Backstop above the Gradle test-task timeout, which should always fire first
    # and turn a hang into a normal failure with test reports uploaded
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Build
        run: ./gradlew build

      - name: Publish test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: '**/build/reports/tests/test/'

  weston-demo:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Install Weston
        run: sudo apt-get update && sudo apt-get install -y weston

      - name: Run demo against headless Weston
        run: |
          export XDG_RUNTIME_DIR=$(mktemp -d)
          chmod 700 "$XDG_RUNTIME_DIR"
          weston --backend=headless --socket=wayland-ci --idle-time=0 &
          sleep 3
          WAYLAND_DISPLAY=wayland-ci ./gradlew :examples:test

      - name: Publish test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: weston-test-reports
          path: 'examples/build/reports/tests/test/'
